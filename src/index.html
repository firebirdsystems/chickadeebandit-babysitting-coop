<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Babysitting Co-op Ledger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--hub-bg, #f9fafb);
      --surface: var(--hub-surface, #ffffff);
      --border: var(--hub-border, #e5e7eb);
      --border-mid: var(--hub-border, #d1d5db);
      --text: var(--hub-text, #111827);
      --muted: var(--hub-text-muted, #6b7280);
      --accent: var(--hub-primary, #4f46e5);
      --accent-hover: var(--hub-primary-hover, #4338ca);
      --accent-fg: var(--hub-primary-fg, #ffffff);
      --radius: var(--hub-radius, 8px);
      --green: #047857;
      --green-soft: #d1fae5;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --blue-soft: #dbeafe;
      --shadow: 0 1px 3px rgba(15, 23, 42, .07);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: var(--hub-font-size, 15px);
      line-height: 1.5;
    }
    .app { max-width: 820px; margin: 0 auto; padding: 16px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    h1 { font-size: 1.35rem; line-height: 1.2; }
    h2 { font-size: 1rem; margin-bottom: 10px; }
    .muted { color: var(--muted); }
    .tiny { font-size: .78rem; }
    .stack { display: grid; gap: 12px; }
    .grid { display: grid; gap: 12px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .row-card { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .item-title { font-weight: 750; font-size: 1rem; }
    .item-meta { margin-top: 3px; color: var(--muted); font-size: .82rem; }
    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 24px; padding: 2px 8px; border-radius: 999px;
      background: #f1f5f9; color: var(--muted); font-size: .74rem; font-weight: 700; white-space: nowrap;
    }
    .pill.good { background: var(--green-soft); color: var(--green); }
    .pill.warn { background: var(--amber-soft); color: var(--amber); }
    .pill.info { background: var(--blue-soft); color: #1d4ed8; }
    .tabs { display: flex; gap: 4px; background: var(--border); padding: 3px; border-radius: 10px; margin-bottom: 14px; }
    .tab { flex: 1; border: 0; border-radius: 8px; background: transparent; color: var(--muted); padding: 8px; font-weight: 700; cursor: pointer; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 6px 2px 10px; }
    .section-head h2 { margin-bottom: 0; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: 1px solid transparent; border-radius: 8px; padding: 8px 12px;
      font: inherit; font-size: .86rem; font-weight: 700; cursor: pointer;
      min-height: 38px; background: var(--accent); color: var(--accent-fg);
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .48; cursor: default; }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-mid); }
    .btn-ghost:hover { background: #f8fafc; }
    .btn-danger { background: var(--red-soft); color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: #fecaca; }
    .btn-quiet-danger { min-height: 28px; padding: 3px 6px; background: transparent; color: var(--muted); border: 0; font-size: .76rem; font-weight: 700; }
    .btn-quiet-danger:hover { background: var(--red-soft); color: var(--red); }
    .btn-sm { min-height: 31px; padding: 5px 9px; font-size: .78rem; }
    /* Balance hero */
    .balance { text-align: center; padding: 20px 14px; }
    .balance-net { font-size: 2rem; font-weight: 800; line-height: 1.1; }
    .balance-net.pos { color: var(--green); }
    .balance-net.neg { color: var(--red); }
    .balance-sub { color: var(--muted); font-size: .84rem; margin-top: 4px; }
    .stat-row { display: flex; gap: 10px; margin-top: 14px; }
    .stat { flex: 1; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
    .stat-val { font-weight: 800; font-size: 1.05rem; }
    .stat-lbl { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; }
    .partner { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-top: 1px solid var(--border); }
    .partner:first-child { border-top: 0; }
    .partner-net.pos { color: var(--green); font-weight: 750; }
    .partner-net.neg { color: var(--red); font-weight: 750; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: .74rem; font-weight: 800; background: #0f766e; }
    .who { display: inline-flex; align-items: center; gap: 8px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .form { display: grid; gap: 10px; }
    .field { display: grid; gap: 4px; }
    label { font-size: .76rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 800; }
    input, textarea, select {
      width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 9px 11px; font: inherit; background: var(--surface); color: var(--text);
    }
    textarea { min-height: 64px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .45); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
    .modal { background: var(--surface); border-radius: 12px; padding: 18px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(15,23,42,.25); }
    .modal h2 { margin-bottom: 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
    .empty, .loading { color: var(--muted); text-align: center; padding: 32px 16px; }
    .error { background: var(--red-soft); color: var(--red); padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; font-size: .86rem; }
    .notice { background: var(--green-soft); color: var(--green); padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; font-size: .86rem; }
    .two { display: grid; gap: 10px; }
    @media (min-width: 560px) { .two { grid-template-columns: 1fr 1fr; } }
  </style>
  <base href="/run/babysitting-coop/">
</head>
<body>
<div class="app">
  <div id="root" class="loading">Loading…</div>
</div>

<script type="module">
import { esc, isAdult as sdkIsAdult, memberColor, initial, hubConfirm } from "/hub-sdk.js";
import { sendHubNotification, hubAppUrl } from "/hub-sdk.js";
import {
  toMinutes, minutesToLabel, entryStatus, isConfirmed, needsMyConfirmation,
  computeBalances, confirmedMinutes, claimCount, isFull, canClaim, claimErrorMessage,
} from "./logic.js";

const CONTEXT = window.__CONTEXT_URL ?? "";
const DB = window.__DB_URL ?? "";
const CLAIM_URL = window.__CLAIM_URL ?? "";
const RELEASE_URL = window.__RELEASE_URL ?? "";
const APP_ID = window.__APP_ID ?? "babysitting-coop";
const EVENTS_URL = window.__EVENTS_URL ?? "/api/events";
const HUB_MEMBER = window.__CURRENT_MEMBER ?? null;

const T = {
  requests: "app_babysitting_coop__coverage_requests",
  claims: "app_babysitting_coop__coverage_claims",
  entries: "app_babysitting_coop__ledger_entries",
  agreements: "app_babysitting_coop__ledger_agreements",
};

let members = [];
let memberMap = new Map();
let me = null;
let requests = [];
let claims = [];
let entries = [];
let agreements = [];              // array of agreement rows
let agreementsById = new Map();   // id -> agreement row
let view = "ledger";
let error = "";
let notice = "";

// ── Utilities ─────────────────────────────────────────────────────────────────
function nowIso() { return new Date().toISOString(); }
function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(value) {
  if (!value) return "";
  return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", year: "numeric" })
    .format(new Date(`${value}T12:00:00`));
}
function memberName(id) { return memberMap.get(id)?.name ?? "A member"; }
function otherAdults() { return members.filter(m => m.role === "adult" && m.id !== me?.id); }
function rebuildAgreementIndex() { agreementsById = new Map(agreements.map(a => [a.id, a])); }

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// api/agree writes the endpoint_only ledger_agreements table; a participant may
// only set THEIR OWN flag. First call bootstraps the row from ledger_entries.
async function agreeOnServer(id, agreed) {
  if (!DB) return;
  const res = await fetch(`/run/${APP_ID}/api/agree`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ table: "ledger_agreements", id, agreed }),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || json.error) throw new Error(json.error || "Could not record agreement.");
  return json;
}

function clearMessages() { error = ""; notice = ""; }
function showError(message) { error = message; notice = ""; render(); }
function showNotice(message) { notice = message; error = ""; render(); }

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadMembers() {
  if (!CONTEXT) {
    members = [
      { id: "demo-1", name: "Alex Rivera", role: "adult" },
      { id: "demo-2", name: "Jordan Kim", role: "adult" },
      { id: "demo-3", name: "Sam Patel", role: "adult" },
    ];
  } else {
    try {
      const res = await fetch(`${CONTEXT}?keys=family.members`);
      members = ((await res.json())["family.members"]) ?? [];
    } catch { members = []; }
  }
  memberMap = new Map(members.map(m => [m.id, m]));
  me = HUB_MEMBER ?? members[0] ?? { id: "guest", name: "Guest", role: "adult" };
}

async function loadData() {
  if (!DB) { seedDemo(); return; }
  const [reqRows, claimRows, entryRows, agreeRows] = await Promise.all([
    db(`SELECT * FROM ${T.requests} ORDER BY date ASC, created_at ASC`),
    db(`SELECT * FROM ${T.claims} ORDER BY claimed_at ASC`),
    db(`SELECT * FROM ${T.entries} ORDER BY created_at DESC`),
    db(`SELECT * FROM ${T.agreements}`),
  ]);
  requests = reqRows.rows;
  claims = claimRows.rows;
  entries = entryRows.rows;
  agreements = agreeRows.rows;
  rebuildAgreementIndex();
}

function seedDemo() {
  requests = [{
    id: "req-1", requester_id: "demo-2", requester_name: "Jordan Kim",
    title: "Date night — need a sitter", date: today(), start_time: "18:00", end_time: "22:00",
    kids: "2 kids (4 & 6)", est_minutes: 240, capacity: 1, status: "open", notes: "Bedtime at 8.", created_at: nowIso(),
  }];
  claims = [];
  entries = [
    { id: "e-1", sitter_id: "demo-1", sitter_name: "Alex Rivera", parent_id: "demo-2", parent_name: "Jordan Kim", minutes: 180, occurred_on: today(), note: "Movie night", request_id: null, created_at: nowIso() },
    { id: "e-2", sitter_id: "demo-2", sitter_name: "Jordan Kim", parent_id: "demo-1", parent_name: "Alex Rivera", minutes: 90, occurred_on: today(), note: "", request_id: null, created_at: nowIso() },
  ];
  agreements = [
    { id: "e-1", sitter_id: "demo-1", parent_id: "demo-2", sitter_agreed: 1, parent_agreed: 1, status: "locked", locked_at: nowIso(), updated_at: nowIso() },
    { id: "e-2", sitter_id: "demo-2", parent_id: "demo-1", sitter_agreed: 1, parent_agreed: 0, status: "pending", locked_at: null, updated_at: nowIso() },
  ];
  rebuildAgreementIndex();
}

async function refresh() {
  clearMessages();
  try {
    await loadMembers();
    await loadData();
    render();
  } catch (e) {
    error = e.message; render();
  }
}

// ── Ledger actions ────────────────────────────────────────────────────────────
async function submitLogHours() {
  const parentId = document.getElementById("f-parent")?.value;
  const hours = document.getElementById("f-hours")?.value;
  const mins = document.getElementById("f-mins")?.value;
  const occurred = document.getElementById("f-date")?.value || today();
  const note = document.getElementById("f-note")?.value.trim() ?? "";
  const requestId = document.getElementById("f-request-id")?.value || null;
  const minutes = toMinutes(hours, mins);
  const parent = memberMap.get(parentId);

  if (!parent) { showError("Pick the parent you sat for."); return; }
  if (parentId === me.id) { showError("You can't log hours against yourself."); return; }
  if (minutes <= 0) { showError("Enter how long you sat."); return; }

  const btn = modalEl?.querySelector(".modal-actions .btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }

  const id = crypto.randomUUID();
  const created = nowIso();
  const entry = {
    id, sitter_id: me.id, sitter_name: me.name, parent_id: parentId, parent_name: parent.name,
    minutes, occurred_on: occurred, note, request_id: requestId, created_at: created,
  };

  try {
    if (DB) {
      await db(
        `INSERT INTO ${T.entries} (id, sitter_id, sitter_name, parent_id, parent_name, minutes, occurred_on, note, request_id, created_at)
         VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
        [id, me.id, me.name, parentId, parent.name, minutes, occurred, note, requestId, created]
      );
      // Seed the agreement row and record the sitter's own consent.
      await agreeOnServer(id, true);
    }
    entries = [entry, ...entries];
    const agreement = { id, sitter_id: me.id, parent_id: parentId, sitter_agreed: 1, parent_agreed: 0, status: "pending", locked_at: null, updated_at: created };
    agreements = [agreement, ...agreements];
    rebuildAgreementIndex();

    // Auto-close the linked coverage request. coverage_requests is adult_writable,
    // so the sitter (an adult) is permitted to flip its status. Best-effort — a
    // failure here must not discard the logged hours.
    const linked = requestId ? requests.find(r => r.id === requestId) : null;
    if (linked && linked.status === "open") {
      try {
        if (DB) await db(`UPDATE ${T.requests} SET status = 'closed' WHERE id = ?`, [requestId]);
        linked.status = "closed";
      } catch { /* leave the request open; the poster can close it manually */ }
    }

    closeModal();
    showNotice(`Logged ${minutesToLabel(minutes)} — waiting for ${parent.name} to confirm.${linked ? " Coverage request closed." : ""}`);

    // Ask the parent to confirm (targeted, non-blocking).
    sendHubNotification({
      title: "Confirm babysitting hours",
      body: `${me.name} logged ${minutesToLabel(minutes)} of sitting for you.`,
      audience: [parentId],
      url: hubAppUrl(APP_ID, {}),
    }).catch(() => {});
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = "Log hours"; }
    showError(e.message);
  }
}

async function confirmEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry || entry.parent_id !== me?.id) { showError("Only the parent named on the entry can confirm it."); return; }
  try {
    if (DB) await agreeOnServer(id, true);
    const a = agreementsById.get(id);
    if (a) { a.parent_agreed = 1; a.sitter_agreed = 1; a.status = "locked"; a.locked_at = nowIso(); }
    rebuildAgreementIndex();
    showNotice(`Confirmed ${minutesToLabel(entry.minutes)} with ${entry.sitter_name}.`);

    fetch(EVENTS_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ source_app_id: APP_ID, type: "babysitting.hours_confirmed", subject_id: entry.sitter_id,
        payload: { minutes: entry.minutes, sitter_id: entry.sitter_id, parent_id: entry.parent_id } }),
    }).catch(() => {});
    sendHubNotification({
      title: "Hours confirmed", body: `${me.name} confirmed ${minutesToLabel(entry.minutes)} of sitting.`,
      audience: [entry.sitter_id], url: hubAppUrl(APP_ID, {}),
    }).catch(() => {});
  } catch (e) { showError(e.message); }
}

async function deleteEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  const mine = entry.sitter_id === me?.id;
  const ok = await hubConfirm(
    mine ? "Withdraw this logged sitting?" : "Decline these hours?",
    {
      description: "The entry will be removed for both of you.",
      confirmLabel: mine ? "Withdraw" : "Decline",
      destructive: true,
    }
  );
  if (!ok) return;
  try {
    if (DB) await db(`DELETE FROM ${T.entries} WHERE id = ?`, [id]);
    entries = entries.filter(e => e.id !== id);
    showNotice(mine ? "Sitting withdrawn." : "Hours declined.");
  } catch (e) { showError(e.message); }
}

// ── Coverage actions ──────────────────────────────────────────────────────────
async function submitRequest() {
  const title = document.getElementById("f-title")?.value.trim();
  const date = document.getElementById("f-rdate")?.value;
  const start = document.getElementById("f-start")?.value ?? "";
  const end = document.getElementById("f-end")?.value ?? "";
  const kids = document.getElementById("f-kids")?.value.trim() ?? "";
  const estMinutes = toMinutes(document.getElementById("f-est-h")?.value, document.getElementById("f-est-m")?.value);
  const notes = document.getElementById("f-rnotes")?.value.trim() ?? "";
  if (!title || !date) { showError("Add a title and a date."); return; }

  const btn = modalEl?.querySelector(".modal-actions .btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Posting…"; }

  const id = crypto.randomUUID();
  const created = nowIso();
  const request = {
    id, requester_id: me.id, requester_name: me.name, title, date, start_time: start, end_time: end,
    kids, est_minutes: estMinutes, capacity: 1, status: "open", notes, created_at: created,
  };
  try {
    if (DB) {
      await db(
        `INSERT INTO ${T.requests} (id, requester_id, requester_name, title, date, start_time, end_time, kids, est_minutes, capacity, status, notes, created_at)
         VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, 1, 'open', ?, ?)`,
        [id, me.id, me.name, title, date, start, end, kids, estMinutes, notes, created]
      );
    }
    requests = [...requests, request].sort((a, b) => a.date.localeCompare(b.date));
    closeModal();
    showNotice("Coverage request posted.");

    fetch(EVENTS_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ source_app_id: APP_ID, type: "babysitting.coverage_posted", subject_id: id,
        payload: { title, date } }),
    }).catch(() => {});
    const audience = otherAdults().map(m => m.id);
    if (audience.length) {
      sendHubNotification({
        title: "Sitter needed", body: `${me.name}: ${title} (${fmtDate(date)})`,
        audience, url: hubAppUrl(APP_ID, {}),
      }).catch(() => {});
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = "Post request"; }
    showError(e.message);
  }
}

async function claimRequest(requestId) {
  const request = requests.find(r => r.id === requestId);
  if (!request || !me) return;
  if (!canClaim(request, claims, me.id)) { showError("You can't cover that request."); return; }
  const claim = { id: crypto.randomUUID(), request_id: requestId, member_id: me.id, note: "", claimed_at: nowIso() };
  try {
    if (CLAIM_URL) {
      const res = await fetch(CLAIM_URL, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slot_id: requestId }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.error) { await loadData().catch(() => {}); showError(claimErrorMessage(json)); return; }
      if (json.claim_id) claim.id = json.claim_id;
    }
    claims = [...claims, claim];
    showNotice("You offered to cover this. Log the hours here once you've sat.");
    sendHubNotification({
      title: "Coverage claimed", body: `${me.name} offered to cover "${request.title}".`,
      audience: [request.requester_id], url: hubAppUrl(APP_ID, {}),
    }).catch(() => {});
  } catch (e) { await loadData().catch(() => {}); showError(e.message); }
}

async function releaseRequest(requestId) {
  const mineClaim = claims.find(c => c.request_id === requestId && c.member_id === me?.id);
  if (!mineClaim) return;
  try {
    if (RELEASE_URL) {
      const res = await fetch(RELEASE_URL, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slot_id: requestId }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.error) { showError(json.error || "Could not withdraw."); return; }
    }
    claims = claims.filter(c => c.id !== mineClaim.id);
    showNotice("You withdrew your offer.");
  } catch (e) { showError(e.message); }
}

async function closeRequest(requestId) {
  const request = requests.find(r => r.id === requestId);
  if (!request || request.requester_id !== me?.id) { showError("Only the poster can close a request."); return; }
  try {
    if (DB) await db(`UPDATE ${T.requests} SET status = 'closed' WHERE id = ?`, [requestId]);
    request.status = "closed";
    showNotice("Request closed.");
  } catch (e) { showError(e.message); }
}

async function reopenRequest(requestId) {
  const request = requests.find(r => r.id === requestId);
  if (!request || request.requester_id !== me?.id) return;
  try {
    if (DB) await db(`UPDATE ${T.requests} SET status = 'open' WHERE id = ?`, [requestId]);
    request.status = "open";
    showNotice("Request reopened.");
  } catch (e) { showError(e.message); }
}

async function deleteRequest(requestId) {
  const request = requests.find(r => r.id === requestId);
  if (!request || request.requester_id !== me?.id) { showError("Only the poster can delete a request."); return; }
  const ok = await hubConfirm("Delete this coverage request?", { confirmLabel: "Delete", destructive: true });
  if (!ok) return;
  try {
    if (DB) await db(`DELETE FROM ${T.requests} WHERE id = ?`, [requestId]);
    requests = requests.filter(r => r.id !== requestId);
    claims = claims.filter(c => c.request_id !== requestId);
    showNotice("Request deleted.");
  } catch (e) { showError(e.message); }
}

// ── Modals ────────────────────────────────────────────────────────────────────
let modalEl = null;
function openModal(html) {
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal">${html}</div>`;
  modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
  const first = modalEl.querySelector("[data-autofocus]");
  if (first) first.focus();
}
function closeModal() { modalEl?.remove(); modalEl = null; }

function openLogForCoverage(requestId) {
  const request = requests.find(r => r.id === requestId);
  if (!request) return;
  openLogHoursModal({
    parentId: request.requester_id,
    minutes: Number(request.est_minutes) || 0,
    date: request.date,
    requestId: request.id,
    requestTitle: request.title,
  });
}

function openLogHoursModal(prefill = {}) {
  const partners = otherAdults();
  if (!partners.length) { showError("Add another adult to the household to exchange hours."); return; }
  const hasParent = prefill.parentId && partners.some(p => p.id === prefill.parentId);
  const defH = prefill.minutes ? Math.floor(prefill.minutes / 60) : 2;
  const defM = prefill.minutes ? prefill.minutes % 60 : 0;
  const defDate = prefill.date || today();
  openModal(`
    <h2>Log hours you sat</h2>
    <p class="muted tiny" style="margin-bottom:12px">You provided care, so you earn the credit. The parent you sat for must confirm before it counts.</p>
    ${prefill.requestTitle ? `<p class="muted tiny" style="margin-bottom:12px">For coverage request: <strong>${esc(prefill.requestTitle)}</strong> — logging will close it.</p>` : ""}
    <div class="form">
      <input type="hidden" id="f-request-id" value="${esc(prefill.requestId || "")}" />
      <div class="field">
        <label for="f-parent">Parent you sat for</label>
        <select id="f-parent" ${hasParent ? "" : "data-autofocus"}>
          ${partners.map(p => `<option value="${esc(p.id)}" ${hasParent && p.id === prefill.parentId ? "selected" : ""}>${esc(p.name)}</option>`).join("")}
        </select>
      </div>
      <div class="two">
        <div class="field"><label for="f-hours">Hours</label><input id="f-hours" type="number" min="0" value="${esc(String(defH))}" ${hasParent ? "data-autofocus" : ""} /></div>
        <div class="field"><label for="f-mins">Minutes</label><input id="f-mins" type="number" min="0" max="59" step="5" value="${esc(String(defM))}" /></div>
      </div>
      <div class="field"><label for="f-date">Date</label><input id="f-date" type="date" value="${esc(defDate)}" /></div>
      <div class="field"><label for="f-note">Note (optional)</label><input id="f-note" placeholder="Bedtime went smoothly" /></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" data-close>Cancel</button>
        <button class="btn btn-primary" type="button" data-submit-log>Log hours</button>
      </div>
    </div>
  `);
}

function openRequestModal() {
  openModal(`
    <h2>Post a coverage request</h2>
    <div class="form">
      <div class="field"><label for="f-title">Title</label><input id="f-title" data-autofocus placeholder="Need a sitter Friday night" /></div>
      <div class="field"><label for="f-rdate">Date</label><input id="f-rdate" type="date" value="${today()}" /></div>
      <div class="two">
        <div class="field"><label for="f-start">Start</label><input id="f-start" type="time" value="18:00" /></div>
        <div class="field"><label for="f-end">End</label><input id="f-end" type="time" value="22:00" /></div>
      </div>
      <div class="field"><label for="f-kids">Kids</label><input id="f-kids" placeholder="2 kids (4 & 6)" /></div>
      <div class="two">
        <div class="field"><label for="f-est-h">Est. hours</label><input id="f-est-h" type="number" min="0" value="4" /></div>
        <div class="field"><label for="f-est-m">Est. minutes</label><input id="f-est-m" type="number" min="0" max="59" step="5" value="0" /></div>
      </div>
      <div class="field"><label for="f-rnotes">Notes (optional)</label><textarea id="f-rnotes" placeholder="Bedtime at 8, snacks in the pantry"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" data-close>Cancel</button>
        <button class="btn btn-primary" type="button" data-submit-request>Post request</button>
      </div>
    </div>
  `);
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderMessages() {
  return `${error ? `<div class="error">${esc(error)}</div>` : ""}${notice ? `<div class="notice">${esc(notice)}</div>` : ""}`;
}

function renderTabs() {
  return `
    <div class="tabs">
      <button class="tab ${view === "ledger" ? "active" : ""}" data-tab="ledger">Ledger</button>
      <button class="tab ${view === "coverage" ? "active" : ""}" data-tab="coverage">Coverage</button>
    </div>`;
}

function avatar(id, name) {
  return `<span class="avatar" style="background:${esc(memberColor(id, members))}">${esc(initial(name))}</span>`;
}

function renderBalance() {
  const bal = computeBalances(entries, agreementsById, me?.id);
  const cls = bal.net > 0 ? "pos" : bal.net < 0 ? "neg" : "";
  const label = bal.net > 0 ? "the co-op owes you care"
    : bal.net < 0 ? "you owe the co-op care" : "you're all square";
  const partners = bal.byPartner.map(p => `
    <div class="partner">
      <span class="who">${avatar(p.partnerId, p.partnerName)} ${esc(p.partnerName)}</span>
      <span class="partner-net ${p.net > 0 ? "pos" : "neg"}">${p.net > 0 ? "+" : ""}${esc(minutesToLabel(p.net))}</span>
    </div>`).join("");
  return `
    <section class="card balance">
      <div class="balance-net ${cls}">${bal.net > 0 ? "+" : ""}${esc(minutesToLabel(bal.net))}</div>
      <div class="balance-sub">${esc(label)}</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-val">${esc(minutesToLabel(bal.earned))}</div><div class="stat-lbl">Sat for others</div></div>
        <div class="stat"><div class="stat-val">${esc(minutesToLabel(bal.spent))}</div><div class="stat-lbl">Others sat for you</div></div>
      </div>
    </section>
    ${partners ? `<section class="card"><h2>By member</h2>${partners}</section>` : ""}
  `;
}

function renderEntryRow(entry) {
  const agreement = agreementsById.get(entry.id);
  const confirmed = isConfirmed(agreement);
  const iAmSitter = entry.sitter_id === me?.id;
  const counterId = iAmSitter ? entry.parent_id : entry.sitter_id;
  const counterName = iAmSitter ? entry.parent_name : entry.sitter_name;
  // Show the frozen snapshot amount for confirmed entries so the displayed value
  // always matches what the balance counts (a post-confirmation edit is ignored).
  const shownMinutes = confirmed ? confirmedMinutes(agreement, entry) : entry.minutes;
  const dir = iAmSitter
    ? `<span class="pill good">You earned +${esc(minutesToLabel(shownMinutes))}</span>`
    : `<span class="pill warn">You owe ${esc(minutesToLabel(shownMinutes))}</span>`;
  const statusPill = confirmed
    ? `<span class="pill good">Confirmed</span>`
    : `<span class="pill info">Pending</span>`;
  const canConfirm = needsMyConfirmation(entry, agreement, me?.id) && entry.parent_id === me?.id;
  const actions = [];
  if (canConfirm) actions.push(`<button class="btn btn-sm" data-confirm="${esc(entry.id)}">Confirm</button>`);
  if (!confirmed) actions.push(`<button class="btn btn-quiet-danger" data-del-entry="${esc(entry.id)}">${iAmSitter ? "Withdraw" : "Decline"}</button>`);
  return `
    <div class="card">
      <div class="row-card">
        <div>
          <div class="item-title">${esc(counterName)}</div>
          <div class="item-meta">${esc(fmtDate(entry.occurred_on))}${entry.note ? ` · ${esc(entry.note)}` : ""}</div>
          <div style="margin-top:8px">${dir}</div>
        </div>
        <div style="text-align:right;display:grid;gap:8px;justify-items:end">
          ${statusPill}
          ${avatar(counterId, counterName)}
        </div>
      </div>
      ${actions.length ? `<div class="actions" style="margin-top:10px">${actions.join("")}</div>` : ""}
    </div>`;
}

function renderLedger() {
  const pending = entries.filter(e => needsMyConfirmation(e, agreementsById.get(e.id), me?.id) && e.parent_id === me?.id);
  const rest = entries.filter(e => !pending.includes(e));
  return `
    ${renderBalance()}
    ${pending.length ? `
      <div class="section-head"><h2>Waiting on you</h2></div>
      <section class="stack">${pending.map(renderEntryRow).join("")}</section>` : ""}
    <div class="section-head">
      <h2>History</h2>
      ${isAdult(me) ? `<button class="btn btn-sm" data-log>Log hours</button>` : ""}
    </div>
    <section class="stack">
      ${rest.length ? rest.map(renderEntryRow).join("") : `<div class="card empty">No sittings logged yet.</div>`}
    </section>`;
}

function renderRequestCard(request) {
  const count = claimCount(request.id, claims);
  const full = isFull(request, claims);
  const mineClaim = claims.find(c => c.request_id === request.id && c.member_id === me?.id);
  const isPoster = request.requester_id === me?.id;
  const open = request.status === "open";
  const when = [fmtDate(request.date), [request.start_time, request.end_time].filter(Boolean).join("–")].filter(Boolean).join(" · ");
  const claimers = claims.filter(c => c.request_id === request.id)
    .map(c => `<span class="who tiny" style="margin-right:8px">${avatar(c.member_id, memberName(c.member_id))} ${esc(memberName(c.member_id))}</span>`).join("");

  let statusPill;
  if (!open) statusPill = `<span class="pill">Closed</span>`;
  else if (full) statusPill = `<span class="pill good">Covered</span>`;
  else statusPill = `<span class="pill warn">Needs sitter</span>`;

  const alreadyLogged = entries.some(e => e.request_id === request.id && e.sitter_id === me?.id);
  const actions = [];
  if (!isPoster && open && canClaim(request, claims, me?.id)) actions.push(`<button class="btn btn-sm" data-claim="${esc(request.id)}">Offer to cover</button>`);
  if (!isPoster && mineClaim && !alreadyLogged) actions.push(`<button class="btn btn-sm" data-log-coverage="${esc(request.id)}">Log these hours</button>`);
  if (!isPoster && mineClaim) actions.push(`<button class="btn btn-danger btn-sm" data-release="${esc(request.id)}">Withdraw offer</button>`);
  if (isPoster && open) actions.push(`<button class="btn btn-ghost btn-sm" data-close-req="${esc(request.id)}">Close</button>`);
  if (isPoster && !open) actions.push(`<button class="btn btn-ghost btn-sm" data-reopen="${esc(request.id)}">Reopen</button>`);
  if (isPoster) actions.push(`<button class="btn btn-quiet-danger" data-del-request="${esc(request.id)}">Delete</button>`);

  return `
    <article class="card">
      <div class="row-card">
        <div>
          <div class="item-title">${esc(request.title)}</div>
          <div class="item-meta">${esc(when)}${request.kids ? ` · ${esc(request.kids)}` : ""}</div>
          ${request.est_minutes ? `<div class="item-meta">Worth about ${esc(minutesToLabel(request.est_minutes))}</div>` : ""}
          ${request.notes ? `<p class="item-meta">${esc(request.notes)}</p>` : ""}
          ${claimers ? `<div style="margin-top:8px">${claimers}</div>` : ""}
        </div>
        <div style="text-align:right">${statusPill}<div class="item-meta">${count}/${request.capacity}</div></div>
      </div>
      ${actions.length ? `<div class="actions" style="margin-top:10px">${actions.join("")}</div>` : ""}
    </article>`;
}

function renderCoverage() {
  const open = requests.filter(r => r.status === "open");
  const closed = requests.filter(r => r.status !== "open");
  return `
    <div class="section-head">
      <h2>Open requests</h2>
      ${isAdult(me) ? `<button class="btn btn-sm" data-new-request>Post request</button>` : ""}
    </div>
    <section class="stack">
      ${open.length ? open.map(renderRequestCard).join("") : `<div class="card empty">No open coverage requests.</div>`}
    </section>
    ${closed.length ? `
      <div class="section-head" style="margin-top:14px"><h2>Closed</h2></div>
      <section class="stack">${closed.map(renderRequestCard).join("")}</section>` : ""}`;
}

function isAdult(m) { return sdkIsAdult(m); }

function render() {
  const root = document.getElementById("root");
  root.className = "app";
  root.innerHTML = `
    <div class="topbar">
      <div>
        <h1>Babysitting Co-op</h1>
        <p class="muted tiny">Trade sitting hours and keep the ledger square.</p>
      </div>
      <button class="btn btn-ghost btn-sm" data-refresh>Refresh</button>
    </div>
    ${renderTabs()}
    ${renderMessages()}
    ${view === "ledger" ? renderLedger() : renderCoverage()}
  `;
}

// ── Events ────────────────────────────────────────────────────────────────────
document.addEventListener("click", (event) => {
  const t = event.target.closest("button");
  if (!t) return;
  const attr = (name) => t.getAttribute(name);
  if (t.hasAttribute("data-close")) return closeModal();
  if (t.hasAttribute("data-close-req")) return closeRequest(attr("data-close-req"));
  if (t.hasAttribute("data-tab")) { view = attr("data-tab"); clearMessages(); render(); return; }
  if (t.hasAttribute("data-refresh")) return refresh();
  if (t.hasAttribute("data-log")) return openLogHoursModal();
  if (t.hasAttribute("data-submit-log")) return submitLogHours();
  if (t.hasAttribute("data-confirm")) return confirmEntry(attr("data-confirm"));
  if (t.hasAttribute("data-del-entry")) return deleteEntry(attr("data-del-entry"));
  if (t.hasAttribute("data-new-request")) return openRequestModal();
  if (t.hasAttribute("data-submit-request")) return submitRequest();
  if (t.hasAttribute("data-log-coverage")) return openLogForCoverage(attr("data-log-coverage"));
  if (t.hasAttribute("data-claim")) return claimRequest(attr("data-claim"));
  if (t.hasAttribute("data-release")) return releaseRequest(attr("data-release"));
  if (t.hasAttribute("data-reopen")) return reopenRequest(attr("data-reopen"));
  if (t.hasAttribute("data-del-request")) return deleteRequest(attr("data-del-request"));
});

refresh();
</script>
</body>
</html>
